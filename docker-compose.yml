services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/workspace
    # Keeps the container running so VS Code can attach to it
    command: sleep infinity
    depends_on:
      - db
    networks:
      - agent_network

  db:
    image: pgvector/pgvector:pg16
    container_name: policy_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: policy_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge

volumes:
  pgdata:
